<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Caveat:wght@700&family=Nunito:wght@800;900&family=Press+Start+2P&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  .stage { position: relative; width: 1080px; height: 1920px; overflow: hidden; font-family: "Nunito", sans-serif; color: #1f2417; background: #0BB14B; }
  /* brand-green textured paper */
  .stage::before { content: ""; position: absolute; inset: 0; background: url(/assets/tex/paper-white.jpg) center/cover; mix-blend-mode: multiply; opacity: .92; }
  .stage::after { content: ""; position: absolute; inset: 0; background: url(/assets/tex/paper-kraft.jpg) center/cover; mix-blend-mode: soft-light; opacity: .5; }
  /* torn real-paper strips, no shadow */
  .rip { position: absolute; left: -40px; right: -40px; height: 160px; background: url(/assets/tex/paper-white.jpg) center/cover; filter: url(#torn); }
  .rip.top { top: -84px; } .rip.bot { bottom: -84px; }
  .center { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 52px; padding: 0 80px; z-index: 2; }
  .kicker { font-family: "Press Start 2P"; font-size: 24px; color: #fff; letter-spacing: 1px; }
  /* polaroid on real photo paper */
  .polaroid { position: relative; background: #fff url(/assets/tex/paper-white.jpg) center/cover; padding: 24px 24px 86px; transform: rotate(-3deg); }
  .polaroid img { display: block; width: 460px; height: 480px; object-fit: cover; object-position: center 16%; background: #e7ddcf; }
  .polaroid .cap { position: absolute; left: 0; right: 0; bottom: 22px; text-align: center; font-family: "Caveat"; font-size: 50px; color: #555; }
  .pin { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); width: 48px; height: 48px; border-radius: 50%; z-index: 6;
    background: radial-gradient(circle at 36% 30%, #fff 4%, #ff6f8b 38%, #c81f43 100%); }
  /* foolscap note */
  .fool { position: relative; width: 800px; padding: 56px 70px 62px; }
  .fool > * { position: relative; z-index: 1; }
  .fool::before { content: ""; position: absolute; inset: -14px; z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent 0 47px, rgba(92,124,176,.32) 47px 49px),
      linear-gradient(90deg, transparent 58px, rgba(210,80,92,.55) 58px 62px, transparent 62px),
      url(/assets/tex/paper-beige.jpg);
    background-size: auto, auto, cover; background-position: 0 0, 0 0, center; filter: url(#torn); }
  .title { font-family: "Baloo 2"; font-weight: 800; font-size: 90px; line-height: 1.2; letter-spacing: -1px; text-align: center; color: #1f2417; white-space: nowrap; }
  .hl { padding: 0 14px; border-radius: 6px; }
  .cy { background: #35ECEC; } .li { background: #BD8DDB; } .mg { background: #FF12E6; color: #fff; }
  .sub { font-family: "Special Elite"; font-size: 40px; color: #2b3320; text-align: center; margin-top: 18px; }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><filter id="torn" x="-25%" y="-25%" width="150%" height="150%"><feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="4" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="17" xChannelSelector="R" yChannelSelector="G"/></filter></svg>

  <div class="stage">
    <div class="rip top"></div>
    <div class="rip bot"></div>
    <div class="center">
      <div class="kicker">EP 3 &mdash; THE AI BESTIE</div>
      <div class="polaroid">
        <div class="pin"></div>
        <img src="/assets/cover-chin.png" alt="" />
        <div class="cap">chat? co-work? code?</div>
      </div>
      <div class="fool">
        <div class="title"><span class="hl cy">Chat</span> vs <span class="hl li">Co-work</span><br />vs <span class="hl mg">Code</span></div>
        <div class="sub">same Claude, 3 superpowers</div>
      </div>
    </div>
  </div>
</body>
</html>
