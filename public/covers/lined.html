<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Caveat:wght@700&family=Nunito:wght@800;900&family=Press+Start+2P&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  .stage {
    position: relative; width: 1080px; height: 1920px; overflow: hidden;
    font-family: "Nunito", sans-serif; color: #141414; background: #f4edd8;
    background-image: repeating-linear-gradient(180deg, transparent 0 79px, rgba(120,170,210,.40) 79px 81px), url(/assets/tex/paper-white.jpg);
    background-size: auto, cover; background-blend-mode: normal, multiply;
  }
  .margin { position: absolute; top: 0; bottom: 0; left: 132px; width: 4px; background: rgba(255,70,90,.5); }
  .hole { position: absolute; left: 50px; width: 36px; height: 36px; border-radius: 50%; background: #e7e3da; box-shadow: inset 2px 3px 4px rgba(0,0,0,.2); }
  .kicker { position: absolute; left: 184px; top: 120px; font-family: "Press Start 2P"; font-size: 23px; color: #0BB14B; letter-spacing: 1px; }
  .hook { position: absolute; left: 184px; top: 196px; width: 800px; font-family: "Special Elite"; font-size: 64px; line-height: 1.3; color: #2a2a2a; }
  .mk { background: #ffe14d; padding: 2px 10px; border-radius: 3px; }
  .title { position: absolute; left: 184px; top: 470px; }
  .ln { font-family: "Baloo 2"; font-weight: 800; font-size: 150px; line-height: 1.16; letter-spacing: -2px; white-space: nowrap; }
  .chip { display: inline-block; border: 6px solid #141414; border-radius: 20px; padding: 4px 26px; box-shadow: 9px 9px 0 rgba(20,20,20,.2); }
  .c-cy { background: #35ECEC; }
  .c-li { background: #BD8DDB; }
  .c-mg { background: #FF12E6; color: #fff; }
  .vs { font-family: "Caveat"; font-weight: 700; font-size: 104px; color: #FF12E6; margin-right: 22px; display: inline-block; transform: rotate(-7deg); vertical-align: -10px; }
  .face { position: absolute; right: -36px; bottom: -24px; width: 660px; filter: drop-shadow(8px 12px 10px rgba(0,0,0,.32)); }
  .note { position: absolute; left: 184px; bottom: 132px; font-family: "Caveat"; font-weight: 700; font-size: 70px; color: #3a4047; transform: rotate(-2deg); }
  .tape { position: absolute; width: 220px; height: 56px; background: repeating-linear-gradient(90deg, rgba(189,141,219,.55) 0 12px, rgba(189,141,219,.3) 12px 24px); box-shadow: 0 2px 4px rgba(0,0,0,.12); }
  .star { position: absolute; font-family: "Press Start 2P"; font-size: 90px; color: #35ECEC; -webkit-text-stroke: 5px #141414; }
</style>
</head>
<body>
  <div class="stage">
    <div class="margin"></div>
    <div class="hole" style="top:150px"></div>
    <div class="hole" style="top:235px"></div>
    <div class="hole" style="top:320px"></div>

    <div class="tape" style="top:150px; left:560px; transform:rotate(-5deg)"></div>
    <div class="kicker">★ THE AI BESTIE &mdash; EP 3</div>

    <div class="hook">you&rsquo;re only using <span class="mk">1 of these 3</span></div>

    <div class="title">
      <div class="ln"><span class="chip c-cy">Chat</span></div>
      <div class="ln"><span class="vs">vs</span><span class="chip c-li">Co-work</span></div>
      <div class="ln"><span class="vs">vs</span><span class="chip c-mg">Code</span></div>
    </div>

    <div class="star" style="left:560px; top:470px; transform:rotate(-12deg)">&#9733;</div>
    <img class="face" src="/assets/cover-front.png" alt="" />
    <div class="note">which one are you? &darr;</div>
  </div>
</body>
</html>
